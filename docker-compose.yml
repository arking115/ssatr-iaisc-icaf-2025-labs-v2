version: '3.8'

services:
  rt-lab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rt-systems-week1
    privileged: true  # Required for RT scheduling APIs (sched_setscheduler)
    volumes:
      - ./exercises:/workspace/exercises
      - ./scripts:/workspace/scripts
      - ./results:/workspace/results
    working_dir: /workspace
    stdin_open: true
    tty: true
    # Optional: CPU isolation (uncomment to pin to specific cores)
    # cpuset: "0,1"
    # Optional: Memory limit
    # mem_limit: 1g
